<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Police Command Center Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #fff;
        }
        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 20px;
            height: 100vh;
            overflow: hidden;
        }
        .panel {
            background-color: #2a2a2a;
            border: 1px solid #444;
            border-radius: 8px;
            padding: 20px;
            overflow-y: auto;
        }
        .panel h2 {
            margin-bottom: 15px;
            border-bottom: 2px solid #0066cc;
            padding-bottom: 10px;
        }
        .incident-card {
            background-color: #333;
            border-left: 4px solid;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 4px;
            cursor: pointer;
        }
        .incident-card.critical { border-left-color: #ff4444; }
        .incident-card.high { border-left-color: #ff9900; }
        .incident-card.medium { border-left-color: #ffdd00; color: #000; }
        .incident-card.low { border-left-color: #00aa00; }
        .incident-card h3 {
            margin-bottom: 5px;
        }
        .incident-card small {
            display: block;
            opacity: 0.8;
        }
        .officer-card {
            background-color: #333;
            border: 1px solid #555;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 4px;
        }
        .officer-card.available { border-left: 4px solid #00aa00; }
        .officer-card.en-route { border-left: 4px solid #ff9900; }
        .officer-card.occupied { border-left: 4px solid #ff4444; }
        .officer-card h3 {
            margin-bottom: 5px;
        }
        .officer-card .badge {
            display: inline-block;
            background-color: #555;
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 0.85em;
            margin-right: 8px;
        }
        .officer-card .skills {
            font-size: 0.85em;
            opacity: 0.8;
            margin-top: 5px;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: #333;
            border-left: 4px solid #0066cc;
            padding: 15px;
            border-radius: 4px;
            max-width: 300px;
            animation: slideIn 0.3s ease-out;
            z-index: 1000;
        }
        .toast.critical { border-left-color: #ff4444; }
        .toast.high { border-left-color: #ff9900; }
        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        .connection-status {
            position: fixed;
            top: 10px;
            right: 10px;
            padding: 8px 16px;
            border-radius: 4px;
            font-size: 0.9em;
        }
        .connection-status.connected {
            background-color: #00aa00;
            color: white;
        }
        .connection-status.disconnected {
            background-color: #ff4444;
            color: white;
        }
    </style>
</head>
<body>
    <div class="connection-status disconnected" id="connectionStatus">Disconnected</div>
    
    <div class="container">
        <div class="panel">
            <h2>Active Incidents</h2>
            <div id="incidentsList"></div>
        </div>
        <div class="panel">
            <h2>Officers on Duty</h2>
            <div id="officersList"></div>
        </div>
    </div>

    <script>
        // Initialize native WebSocket connection
        const ws = new WebSocket('ws://localhost:5000/ws/incidents');

        ws.onopen = function() {
            console.log('WebSocket connected');
            document.getElementById('connectionStatus').textContent = 'Connected';
            document.getElementById('connectionStatus').className = 'connection-status connected';
        };

        ws.onclose = function() {
            console.log('WebSocket disconnected');
            document.getElementById('connectionStatus').textContent = 'Disconnected';
            document.getElementById('connectionStatus').className = 'connection-status disconnected';
        };

        ws.onmessage = function(event) {
            try {
                const data = JSON.parse(event.data);

                if (data.type === 'incident_update') {
                    addOrUpdateIncident(data.data);
                    showToast(data.data.title, data.data.severity);
                }

                if (data.type === 'officer_update') {
                    updateOfficerCard(data.data);
                }
            } catch (error) {
                console.error('Failed to parse WebSocket message:', error);
            }
        };

        // Load initial data on page load
        function loadInitialData() {
            fetchIncidents();
            fetchOfficers();
        }

        // Fetch incidents from API
        function fetchIncidents() {
            fetch('/api/incidents')
                .then(response => response.json())
                .then(incidents => {
                    incidents.forEach(incident => addOrUpdateIncident(incident));
                })
                .catch(error => console.error('Error fetching incidents:', error));
        }

        // Fetch officers from API
        function fetchOfficers() {
            fetch('/api/officers/status')
                .then(response => response.json())
                .then(officers => {
                    officers.forEach(officer => updateOfficerCard(officer));
                })
                .catch(error => console.error('Error fetching officers:', error));
        }

        // Add or update an incident in the UI
        function addOrUpdateIncident(incident) {
            const list = document.getElementById('incidentsList');
            let card = document.getElementById(`incident-${incident.id}`);
            
            if (!card) {
                card = document.createElement('div');
                card.id = `incident-${incident.id}`;
                card.className = `incident-card ${incident.severity}`;
                list.appendChild(card);
            }
            
            const timestamp = new Date(incident.created_at).toLocaleTimeString();
            card.innerHTML = `
                <h3>${incident.title}</h3>
                <small>Severity: ${incident.severity.toUpperCase()} | Status: ${incident.status}</small>
                <small>Location: ${incident.lat.toFixed(4)}, ${incident.lng.toFixed(4)}</small>
                <small>Time: ${timestamp}</small>
            `;
            card.className = `incident-card ${incident.severity}`;
        }

        // Update or create an officer card in the UI
        function updateOfficerCard(officer) {
            const list = document.getElementById('officersList');
            let card = document.getElementById(`officer-${officer.id}`);
            
            if (!card) {
                card = document.createElement('div');
                card.id = `officer-${officer.id}`;
                list.appendChild(card);
            }
            
            const lastPing = officer.last_ping ? new Date(officer.last_ping).toLocaleTimeString() : 'Never';
            const skillsList = officer.skills.length > 0 ? officer.skills.join(', ') : 'No skills listed';
            
            card.innerHTML = `
                <h3>${officer.name}</h3>
                <div>
                    <span class="badge">Badge: ${officer.badge}</span>
                    <span class="badge">Status: ${officer.status}</span>
                </div>
                <small>Location: ${officer.lat ? officer.lat.toFixed(4) : 'N/A'}, ${officer.lng ? officer.lng.toFixed(4) : 'N/A'}</small>
                <small>Last Ping: ${lastPing}</small>
                <div class="skills">Skills: ${skillsList}</div>
            `;
            card.className = `officer-card ${officer.status}`;
        }

        // Show toast notification
        function showToast(title, severity) {
            const toast = document.createElement('div');
            toast.className = `toast ${severity}`;
            toast.innerHTML = `<strong>${severity.toUpperCase()}</strong><br>${title}`;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.animation = 'slideOut 0.3s ease-out';
                setTimeout(() => toast.remove(), 300);
            }, 5000);
        }

        // Fallback polling: fetch officers every 30 seconds
        setInterval(() => {
            fetchOfficers();
        }, 30000);

        // Load data when page is ready
        document.addEventListener('DOMContentLoaded', function() {
            loadInitialData();
        });
    </script>
</body>
</html>
