<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Traffic Dashboard</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=Montserrat:wght@300;400;500;600;700;800;900&display=swap');
        
        body {
            font-family: 'Poppins', 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 50%, #2a1f4a 100%);
            background-attachment: fixed;
            background-size: 400% 400%;
            animation: gradientShift 20s ease infinite;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #f8f9fa;
            position: relative;
        }
        
        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(212, 175, 55, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(139, 92, 246, 0.15) 0%, transparent 50%);
            animation: particleFloat 25s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }
        
        @keyframes particleFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
        }

        .auth-container {
            background: rgba(10, 14, 39, 0.85);
            backdrop-filter: blur(40px) saturate(180%);
            border-radius: 32px;
            padding: 50px;
            max-width: 480px;
            width: 100%;
            box-shadow: 
                0 40px 120px rgba(0, 0, 0, 0.6),
                0 0 0 2px rgba(212, 175, 55, 0.2),
                inset 0 0 40px rgba(212, 175, 55, 0.1);
            border: 2px solid rgba(212, 175, 55, 0.3);
            position: relative;
            overflow: hidden;
            z-index: 1;
            animation: slideDown 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-40px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .auth-container::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            padding: 1.5px;
            background: linear-gradient(120deg, rgba(56, 189, 248, 0.8), rgba(236, 72, 153, 0.8));
            -webkit-mask:
                linear-gradient(#000 0 0) content-box,
                linear-gradient(#000 0 0);
            mask:
                linear-gradient(#000 0 0) content-box,
                linear-gradient(#000 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        h1 {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #d4af37 0%, #c9a961 50%, #b8941f 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            font-size: 2.5rem;
            font-weight: 800;
            text-shadow: 0 0 30px rgba(212, 175, 55, 0.5);
            animation: glow 3s ease-in-out infinite;
        }
        
        @keyframes glow {
            0%, 100% { filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.5)); }
            50% { filter: drop-shadow(0 0 20px rgba(212, 175, 55, 0.8)); }
        }

        .subtitle {
            color: rgba(226, 232, 240, 0.7);
            margin-bottom: 30px;
            font-size: 15px;
            font-weight: 500;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .form-group {
            margin-bottom: 24px;
            position: relative;
            animation: slideUp 0.6s ease-out forwards;
        }

        .form-group:nth-child(2) { animation-delay: 0.1s; }
        .form-group:nth-child(3) { animation-delay: 0.2s; }
        .form-group:nth-child(4) { animation-delay: 0.3s; }

        .label-wrapper {
            position: relative;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #cbd5f5;
            font-weight: 600;
            letter-spacing: 0.04em;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .input-wrapper {
            position: relative;
        }

        input,
        select {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid rgba(212, 175, 55, 0.2);
            border-radius: 16px;
            font-size: 15px;
            font-family: 'Poppins', sans-serif;
            background: rgba(10, 14, 39, 0.6);
            color: #f8f9fa;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .input-wrapper:has(.password-toggle) input {
            padding-right: 50px;
        }

        input::placeholder {
            color: rgba(203, 213, 245, 0.3);
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: rgba(212, 175, 55, 0.6);
            box-shadow: 0 0 0 4px rgba(212, 175, 55, 0.15), 0 0 25px rgba(212, 175, 55, 0.35);
            transform: translateY(-3px) scale(1.02);
            background: rgba(10, 14, 39, 0.9);
        }

        input.valid {
            border-color: rgba(34, 197, 94, 0.6);
            box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.15), 0 0 25px rgba(34, 197, 94, 0.25);
        }

        input.invalid {
            border-color: rgba(239, 68, 68, 0.6);
            box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.15), 0 0 25px rgba(239, 68, 68, 0.25);
        }

        .password-toggle {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(212, 175, 55, 0.1);
            border: 1.5px solid rgba(212, 175, 55, 0.3);
            color: #d4af37;
            cursor: pointer;
            padding: 0;
            transition: all 0.3s ease;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            font-size: 0;
            line-height: 0;
            text-indent: -9999px;
            overflow: hidden;
        }

        .password-toggle::before {
            content: '';
            display: block;
            width: 24px;
            height: 24px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="%23d4af37" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>');
            background-size: 100% 100%;
            background-repeat: no-repeat;
            background-position: center;
        }

        .password-toggle:hover {
            background: rgba(212, 175, 55, 0.2);
            border-color: rgba(212, 175, 55, 0.6);
            transform: translateY(-50%) scale(1.08);
            box-shadow: 0 0 12px rgba(212, 175, 55, 0.3);
        }

        .password-toggle:active {
            transform: translateY(-50%) scale(0.95);
        }

        .password-toggle:focus {
            outline: none;
        }

        .password-toggle:active {
            background: rgba(212, 175, 55, 0.2);
        }

        .field-feedback {
            position: absolute;
            top: 100%;
            left: 0;
            margin-top: 4px;
            font-size: 12px;
            font-weight: 500;
            display: none;
            animation: slideDown 0.3s ease;
        }

        .field-feedback.show {
            display: block;
        }

        .field-feedback.valid {
            color: #4ade80;
        }

        .field-feedback.invalid {
            color: #f87171;
        }

        .password-strength {
            margin-top: 8px;
            display: none;
        }

        .password-strength.show {
            display: block;
        }

        .strength-bar {
            height: 4px;
            background: rgba(212, 175, 55, 0.2);
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 4px;
        }

        .strength-fill {
            height: 100%;
            width: 0%;
            border-radius: 2px;
            transition: all 0.3s ease;
        }

        .strength-text {
            font-size: 12px;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .strength-fill.weak {
            background: #f87171;
            width: 33%;
        }

        .strength-fill.fair {
            background: #fbbf24;
            width: 66%;
        }

        .strength-fill.strong {
            background: #4ade80;
            width: 100%;
        }

        .strength-text.weak {
            color: #f87171;
        }

        .strength-text.fair {
            color: #fbbf24;
        }

        .strength-text.strong {
            color: #4ade80;
        }

        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #d4af37 0%, #c9a961 50%, #b8941f 100%);
            color: #0a0e27;
            border: none;
            border-radius: 18px;
            font-size: 16px;
            font-weight: 700;
            font-family: 'Montserrat', sans-serif;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 20px 45px rgba(212, 175, 55, 0.4);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }
        
        button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }
        
        button:hover:not(:disabled)::before {
            width: 400px;
            height: 400px;
        }

        button:hover:not(:disabled) {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 30px 60px rgba(212, 175, 55, 0.6);
        }

        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            position: relative;
        }

        .button-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            margin-right: 8px;
            border: 2px solid rgba(10, 14, 39, 0.3);
            border-top-color: #0a0e27;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        button:disabled .button-spinner {
            display: inline-block;
        }

        .toggle-auth {
            text-align: center;
            margin-top: 20px;
            color: rgba(226, 232, 240, 0.7);
            font-size: 14px;
        }

        .toggle-auth a {
            color: #38bdf8;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            position: relative;
        }

        .toggle-auth a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: #38bdf8;
            transition: width 0.3s ease;
        }

        .toggle-auth a:hover::after {
            width: 100%;
        }

        .error {
            background: rgba(239, 68, 68, 0.15);
            color: #fecaca;
            padding: 16px 20px;
            border-radius: 16px;
            margin-bottom: 20px;
            border: 2px solid rgba(239, 68, 68, 0.5);
            font-family: 'Poppins', sans-serif;
            animation: shake 0.5s ease, slideUp 0.4s ease;
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .error::before {
            content: '⚠️';
            flex-shrink: 0;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .success {
            background: rgba(34, 197, 94, 0.15);
            color: #86efac;
            padding: 16px 20px;
            border-radius: 16px;
            margin-bottom: 20px;
            border: 2px solid rgba(34, 197, 94, 0.5);
            font-family: 'Poppins', sans-serif;
            animation: slideUp 0.4s ease;
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .success::before {
            content: '✓';
            flex-shrink: 0;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .back-link a:hover {
            transform: translateX(-4px);
            color: #818cf8;
        }

        @media (max-width: 480px) {
            .auth-container {
                padding: 40px 30px;
            }

            h1 {
                font-size: 2rem;
            }

            input {
                padding: 14px 16px;
                font-size: 14px;
            }

            button {
                padding: 14px;
                font-size: 14px;
            }
        }
    </style>
</head>

<body>
    <div class="auth-container">
        <h1>🚦 Traffic Dashboard</h1>
        <p class="subtitle" id="subtitle">Login to your account</p>
        <div id="error-message"></div>
        <div id="success-message"></div>
        <form id="auth-form">
            <div class="form-group" id="name-group" style="display: none;">
                <div class="label-wrapper">
                    <label for="full-name">Full Name</label>
                </div>
                <div class="input-wrapper">
                    <input type="text" id="full-name" name="full-name" placeholder="Enter your full name">
                    <div class="field-feedback" id="name-feedback"></div>
                </div>
            </div>
            <div class="form-group">
                <div class="label-wrapper">
                    <label for="username">Username</label>
                </div>
                <div class="input-wrapper">
                    <input type="text" id="username" name="username" placeholder="Enter your username" required>
                    <div class="field-feedback" id="username-feedback"></div>
                </div>
            </div>
            <div class="form-group" id="role-group" style="display: none;">
                <div class="label-wrapper">
                    <label for="role">Role (Auto-detected)</label>
                </div>
                <div class="input-wrapper">
                    <select id="role" name="role" disabled>
                        <option value="user">Normal User</option>
                        <option value="police_supervisor">Police Supervisor</option>
                        <option value="logistics_manager">Logistics Manager</option>
                    </select>
                    <p style="font-size: 12px; color: #cbd5f5; margin-top: 8px;">Your role will be auto-detected based on your account type.</p>
                </div>
            </div>
            <div class="form-group" id="district-group" style="display: none;">
                <div class="label-wrapper">
                    <label for="district-id">District (Police only)</label>
                </div>
                <div class="input-wrapper">
                    <input type="text" id="district-id" name="district-id" placeholder="e.g. district_1">
                </div>
            </div>
            <div class="form-group" id="fleet-group" style="display: none;">
                <div class="label-wrapper">
                    <label for="fleet-zone">Fleet Zone (Logistics only)</label>
                </div>
                <div class="input-wrapper">
                    <input type="text" id="fleet-zone" name="fleet-zone" placeholder="e.g. zone_north">
                </div>
            </div>
            <div class="form-group" id="email-group" style="display: none;">
                <div class="label-wrapper">
                    <label for="email">Email</label>
                </div>
                <div class="input-wrapper">
                    <input type="email" id="email" name="email" placeholder="Enter your email address">
                    <div class="field-feedback" id="email-feedback"></div>
                </div>
            </div>
            <div class="form-group">
                <div class="label-wrapper">
                    <label for="password">Password</label>
                </div>
                <div class="input-wrapper">
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                    <div class="password-strength" id="password-strength">
                        <div class="strength-bar">
                            <div class="strength-fill" id="strength-fill"></div>
                        </div>
                        <div class="strength-text" id="strength-text">Weak</div>
                    </div>
                    <div class="field-feedback" id="password-feedback"></div>
                </div>
            </div>
            <div class="form-group" id="confirm-password-group" style="display: none;">
                <div class="label-wrapper">
                    <label for="confirm-password">Confirm Password</label>
                </div>
                <div class="input-wrapper">
                    <input type="password" id="confirm-password" name="confirm-password" placeholder="Re-enter your password">
                    <button type="button" class="password-toggle" id="confirm-password-toggle" onclick="togglePasswordVisibility('confirm-password')" title="Toggle password visibility"></button>
                    <div class="field-feedback" id="confirm-password-feedback"></div>
                </div>
            </div>
            <button type="submit" id="submit-btn">Login</button>
        </form>
        <div class="toggle-auth">
            <span id="toggle-text">Don't have an account? </span>
            <a href="#" id="toggle-link" onclick="toggleMode(); return false;">Sign up</a>
        </div>
        <div class="back-link">
            <a href="/">← Back to Home</a>
        </div>
    </div>
    <script>
        let isLogin = true;

        // Password visibility toggle
        function togglePasswordVisibility(fieldId = 'password') {
            const passwordInput = document.getElementById(fieldId);
            const toggle = document.getElementById(fieldId === 'password' ? 'password-toggle' : 'confirm-password-toggle');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggle.setAttribute('data-hidden', 'false');
            } else {
                passwordInput.type = 'password';
                toggle.setAttribute('data-hidden', 'true');
            }
        }

        // Password strength checker
        function checkPasswordStrength(password) {
            let strength = 0;
            
            if (password.length >= 8) strength++;
            if (password.length >= 12) strength++;
            if (/[a-z]/.test(password)) strength++;
            if (/[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^a-zA-Z0-9]/.test(password)) strength++;

            const strengthFill = document.getElementById('strength-fill');
            const strengthText = document.getElementById('strength-text');

            if (password.length === 0) {
                document.getElementById('password-strength').classList.remove('show');
                return;
            }

            document.getElementById('password-strength').classList.add('show');
            strengthFill.classList.remove('weak', 'fair', 'strong');
            strengthText.classList.remove('weak', 'fair', 'strong');

            if (strength <= 2) {
                strengthFill.classList.add('weak');
                strengthText.classList.add('weak');
                strengthText.textContent = 'Weak';
            } else if (strength <= 4) {
                strengthFill.classList.add('fair');
                strengthText.classList.add('fair');
                strengthText.textContent = 'Fair';
            } else {
                strengthFill.classList.add('strong');
                strengthText.classList.add('strong');
                strengthText.textContent = 'Strong';
            }
        }

        // Field validation
        function validateField(fieldId, fieldType) {
            const field = document.getElementById(fieldId);
            const feedback = document.getElementById(fieldId + '-feedback');
            
            // Return early if field doesn't exist in DOM (hidden fields)
            if (!field || !feedback) {
                return true;
            }
            
            const value = field.value.trim();
            let isValid = false;
            let message = '';

            if (fieldType === 'username') {
                isValid = value.length >= 3;
                message = isValid ? 'Username looks good!' : 'Username must be at least 3 characters';
            } else if (fieldType === 'email') {
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                isValid = emailRegex.test(value) || value === '';
                message = isValid || value === '' ? 'Email is valid!' : 'Please enter a valid email';
            } else if (fieldType === 'password') {
                isValid = value.length >= 6;
                message = isValid ? 'Password is strong!' : 'Password must be at least 6 characters';
            } else if (fieldType === 'name') {
                isValid = value.length >= 2 || value === '';
                message = isValid || value === '' ? 'Name looks good!' : 'Name must be at least 2 characters';
            }

            if (value === '' && fieldType !== 'name' && fieldType !== 'email') {
                field.classList.remove('valid', 'invalid');
                feedback.classList.remove('show');
                return isValid;
            }

            if (value === '' && (fieldType === 'name' || fieldType === 'email')) {
                field.classList.remove('valid', 'invalid');
                feedback.classList.remove('show');
                return true;
            }

            if (isValid && value !== '') {
                field.classList.add('valid');
                field.classList.remove('invalid');
                feedback.classList.add('show', 'valid');
                feedback.textContent = message;
            } else if (value !== '') {
                field.classList.add('invalid');
                field.classList.remove('valid');
                feedback.classList.add('show', 'invalid');
                feedback.textContent = message;
            }

            return isValid;
        }

        // Setup field listeners
        const fields = ['username', 'email', 'password', 'full-name'];
        fields.forEach(fieldId => {
            const field = document.getElementById(fieldId);
            if (field) {
                field.addEventListener('input', () => {
                    const fieldType = fieldId === 'full-name' ? 'name' : fieldId;
                    if (fieldType === 'password') {
                        checkPasswordStrength(field.value);
                    } else {
                        validateField(fieldId, fieldType);
                    }
                });

                field.addEventListener('blur', () => {
                    const fieldType = fieldId === 'full-name' ? 'name' : fieldId;
                    validateField(fieldId, fieldType);
                });
            }
        });

        // Toggle between login and signup
        function toggleMode() {
            isLogin = !isLogin;
            document.getElementById('subtitle').textContent = isLogin ? 'Login to your account' : 'Create your account';
            document.getElementById('submit-btn').textContent = isLogin ? 'Login' : 'Sign Up';
            document.getElementById('toggle-text').textContent = isLogin ? "Don't have an account? " : "Already have an account? ";
            document.getElementById('toggle-link').textContent = isLogin ? 'Sign up' : 'Login';
            document.getElementById('email-group').style.display = isLogin ? 'none' : 'block';
            document.getElementById('name-group').style.display = isLogin ? 'none' : 'block';
            document.getElementById('confirm-password-group').style.display = isLogin ? 'none' : 'block';
            
            // Update required attributes based on mode
            const emailField = document.getElementById('email');
            const confirmPasswordField = document.getElementById('confirm-password');
            
            if (isLogin) {
                // Login mode - remove required from signup-only fields
                if (emailField) emailField.removeAttribute('required');
                if (confirmPasswordField) confirmPasswordField.removeAttribute('required');
            } else {
                // Signup mode - add required to signup-only fields
                if (emailField) emailField.setAttribute('required', 'required');
                if (confirmPasswordField) confirmPasswordField.setAttribute('required', 'required');
            }
            
            document.getElementById('password').type = 'password';
            document.getElementById('password').value = '';
            if (confirmPasswordField) {
                confirmPasswordField.type = 'password';
                confirmPasswordField.value = '';
            }
            document.getElementById('error-message').innerHTML = '';
            document.getElementById('success-message').innerHTML = '';
            clearValidationStates();
        }

        function clearValidationStates() {
            fields.forEach(fieldId => {
                const field = document.getElementById(fieldId);
                if (field) {
                    field.classList.remove('valid', 'invalid');
                    const feedback = document.getElementById(fieldId + '-feedback');
                    if (feedback) feedback.classList.remove('show');
                }
            });
            document.getElementById('password-strength').classList.remove('show');
        }

        function updateRoleFields() {
            const role = document.getElementById('role').value;
            const districtGroup = document.getElementById('district-group');
            const fleetGroup = document.getElementById('fleet-group');
            const districtInput = document.getElementById('district-id');
            const fleetInput = document.getElementById('fleet-zone');

            districtGroup.style.display = role === 'police_supervisor' ? 'block' : 'none';
            fleetGroup.style.display = role === 'logistics_manager' ? 'block' : 'none';

            if (role === 'police_supervisor') {
                districtInput.setAttribute('required', 'required');
            } else {
                districtInput.removeAttribute('required');
                districtInput.value = '';
            }

            if (role === 'logistics_manager') {
                fleetInput.setAttribute('required', 'required');
            } else {
                fleetInput.removeAttribute('required');
                fleetInput.value = '';
            }
        }

        function showMessage(message, type) {
            const messageDiv = type === 'error' ? 
                document.getElementById('error-message') : 
                document.getElementById('success-message');
            messageDiv.innerHTML = `<div class="${type}">${message}</div>`;
        }

        // Form submission
        document.getElementById('auth-form').onsubmit = async (e) => {
            e.preventDefault();
            document.getElementById('error-message').innerHTML = '';
            document.getElementById('success-message').innerHTML = '';
            
            const btn = document.getElementById('submit-btn');
            
            // Prevent multiple submissions
            if (btn.disabled) {
                return;
            }
            
            const originalText = btn.textContent;
            btn.disabled = true;
            btn.innerHTML = '<span class="button-spinner"></span>' + (isLogin ? 'Logging in...' : 'Creating account...');

            try {
                if (isLogin) {
                    const username = document.getElementById('username').value.trim();
                    const password = document.getElementById('password').value;
                    const role = document.getElementById('role').value;
                    const districtId = document.getElementById('district-id').value.trim();
                    const fleetZone = document.getElementById('fleet-zone').value.trim();

                    console.log('📝 Form Values:');
                    console.log('  Username:', username);
                    console.log('  Password length:', password.length);
                    console.log('  isLogin flag:', isLogin);
                    console.log('  Role:', role);

                    if (!username || !password) {
                        throw new Error('Please enter both username and password');
                    }

                    // Always send 'user' role - backend will auto-detect actual role
                    // This prevents users from selecting the wrong role
                    const rolePayload = { username, password, role: 'user' };

                    // Backend will auto-detect the correct role based on user's account
                    // Police users will get police_supervisor role
                    // Logistics users will get logistics_manager role
                    // Admins will get admin role
                    // Others will get user role

                    console.log('📤 Sending to /auth/login');
                    const res = await fetch('/auth/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(rolePayload)
                    });

                    console.log('📥 Response status:', res.status);
                    
                    if (!res.ok) {
                        const errorData = await res.json();
                        console.log('❌ Login error:', errorData);
                        throw new Error(errorData.detail || 'Invalid username or password');
                    }
                    
                    const data = await res.json();
                    console.log('✅ Login successful!');
                    localStorage.setItem('access_token', data.access_token);
                    localStorage.setItem('user_role', data.role || role || 'user');
                    showMessage('Login successful! Redirecting...', 'success');

                    const urlParams = new URLSearchParams(window.location.search);
                    const redirect = urlParams.get('redirect');

                    setTimeout(() => {
                        if (redirect) {
                            window.location.href = redirect;
                        } else if ((data.role || role) === 'police_supervisor') {
                            window.location.href = `/police/dashboard?token=${encodeURIComponent(data.access_token)}`;
                        } else if ((data.role || role) === 'admin') {
                            window.location.href = '/admin';
                        } else if ((data.role || role) === 'logistics_manager') {
                            window.location.href = '/account';
                        } else {
                            window.location.href = '/';
                        }
                    }, 800);
                } else {
                    const email = document.getElementById('email').value.trim();
                    const username = document.getElementById('username').value.trim();
                    const password = document.getElementById('password').value;
                    const confirmPassword = document.getElementById('confirm-password').value;
                    const fullName = document.getElementById('full-name').value.trim() || null;
                    const role = document.getElementById('role').value;
                    
                    if (!email || !username || !password || !confirmPassword) {
                        throw new Error('Please fill in all required fields');
                    }
                    
                    if (!validateField('email', 'email')) {
                        throw new Error('Please enter a valid email address');
                    }
                    
                    if (password.length < 6) {
                        throw new Error('Password must be at least 6 characters long.');
                    }
                    
                    if (password !== confirmPassword) {
                        throw new Error('Passwords do not match. Please try again.');
                    }
                    
                    const MAX_PASSWORD_LENGTH = 10000;
                    if (password.length > MAX_PASSWORD_LENGTH) {
                        throw new Error(`Password is too long. Maximum ${MAX_PASSWORD_LENGTH} characters allowed.`);
                    }
                    
                    const res = await fetch('/api/auth/register', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            username: username,
                            email: email,
                            password: password,
                            full_name: fullName,
                            role: role
                        })
                    });
                    
                    if (!res.ok) {
                        let errorMsg = 'Registration failed';
                        try {
                            const err = await res.json();
                            if (err.detail) {
                                if (Array.isArray(err.detail)) {
                                    errorMsg = err.detail.map(e => {
                                        if (typeof e === 'object' && e.msg) return e.msg;
                                        if (typeof e === 'string') return e;
                                        return JSON.stringify(e);
                                    }).join(', ');
                                } else if (typeof err.detail === 'string') {
                                    errorMsg = err.detail;
                                } else if (err.detail.message) {
                                    errorMsg = err.detail.message;
                                }
                            } else if (typeof err === 'string') {
                                errorMsg = err;
                            } else if (err.message) {
                                errorMsg = err.message;
                            }
                        } catch (parseError) {
                            errorMsg = `Registration failed: ${res.statusText}`;
                        }
                        throw new Error(errorMsg);
                    }
                    
                    showMessage('Registration successful! Switching to login...', 'success');
                    setTimeout(() => {
                        toggleMode();
                        clearValidationStates();
                    }, 1500);
                }
            } catch (error) {
                showMessage(error.message || 'An error occurred. Please try again.', 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        };
        
        // Initialize logging
        console.log('✅ Form handler attached');
        console.log('isLogin mode:', isLogin);
        
        // Log when page loads
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => {
                console.log('✅ Page fully loaded');
                document.getElementById('role').addEventListener('change', updateRoleFields);
                updateRoleFields();
            });
        } else {
            console.log('✅ Page already loaded');
            document.getElementById('role').addEventListener('change', updateRoleFields);
            updateRoleFields();
        }
    </script>
</body>

</html>
